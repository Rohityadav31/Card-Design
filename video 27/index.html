<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scenic Card</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: gray;
      display: flex;
      justify-content: center; /*card in center*/
      align-items: center; /*all content inside card is center*/
      height: 100vh;
    }
    .card {
      background-color: #104702;
      width: 320px;
      border-radius: 20px;
      box-shadow: 0 4px 12px rgba(45, 0, 46, 0.1);
      overflow: hidden;
    }
    .card img {
      width: 100%;
      height: auto;
      display: block;
    }
    .card-content {
      padding:20px;
    }
    .tags {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
    }
    .tag {
      background-color: whitesmoke;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      color: #4f1212;
    }
    .card-title {
      font-size: 22px;
      font-weight: bold;
      margin: 0 0 10px;
      color: #222;
    }
    .card-text {
      font-size: 14px;
      color: #555;
      line-height: 1.4;
    }
    .read-more {
      display: inline-block;
      margin-top: 18px;
      text-decoration: none;
      background-color: #007bff;
      color: #fff;
      padding: 10px 16px;
      border-radius: 6px;
      transition: background-color 0.3s ease;
    }
    .read-more:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="boat image.jpeg" alt="Scenic Lake View" />
    <div class="card-content">
      <div class="tags">
        <div class="tag">Nature</div>
        <div class="tag">Lake</div>
      </div>
      <h2 class="card-title">Rohit</h2>
      <p class="card-text">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Consectetur sodales morbi dignissim sed diam pharetra vitae ipsum odio.
      </p>
      <a href="#" class="read-more">Read More</a>
    </div>
  </div>
</body>
</html>
