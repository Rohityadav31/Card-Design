<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>position property</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .box {
      height: 133px;
      width: 80vw;
      padding: 3px;
      margin: 3px;
      border: 2px solid black;
    }

    .box1 {
      background-color: aqua;
      position: sticky;
      top: 0%;
      height: 111px;
      width: 100px;
      margin: 0;
      padding: 0;

    }
    .box2 {
      background-color: hotpink;
       /* position: relative;  */
      /* top: 34px;
      left: 56px; */
    }
    .box3 {
      background-color: cadetblue;
      /* position: fixed;
      bottom: 0px;
      left: 8vw; */
    }
    .box4 {
      background-color: chocolate;
    }

    .parent{
      margin: 34px;
      padding: 43px;
      border: 3px solid purple;
     /* position: relative; */
     transform:translate(0);
     filter: invert();
    }
  </style>
  <body>
    <div class="parent">
      <div class="box box1"></div>
      <div class="box box2"></div>
      <div class="box box3"></div>
      <div class="box box4"></div>
    </div>
    <!--by below syntax i can target each boxes one at a time-->
  </body>
</html>
