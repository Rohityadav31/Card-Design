<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shadow in html</title>
    <style>
      .box {
        border: 2px solid black;
        padding: 34px;
        box-shadow: 10px 14px 5px #888888;
      }
      .text-element {text-shadow: 2px 2px 4px #990606;}
    </style>
  </head>
  <body>
    <div class="box">I am a box</div>

    <p class="text-element">
      Lorem ipsum, dolor sit amet consectetur adipisicing elit. Perspiciatis
      nostrum, placeat incidunt rerum laudantium repellat quod magni? Ipsa
      deleniti assumenda atque at sequi illo laboriosam hic iusto, sed vero
      maiores.
    </p>
  </body>
</html>
