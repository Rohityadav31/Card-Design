<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>overflow property</title>
  <style>
    .box{
      width: 30vw;
      height: 20vh;
      border: solid black;
      overflow: auto;
      /* white-space: nowrap; */
      text-overflow: ellipsis;
      /*x , y repectively*/
      overflow: hidden scroll;
    }
  </style>
</head>
<body>
  <div class="box">
    Lorem ipsum dolor sit amet consectetur adipisicing elit. Cum itaque culpa, in, laudantium possimus temporibus animi eos tempora dolore, cupiditate rerum fuga. Quia, eligendi deleniti.

  </div>
</body>
</html>
